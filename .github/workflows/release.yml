name: Release

on:
    release:
        types:
            - created

permissions:
    contents: write

jobs:
    release:
        name: ${{ matrix.target }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      asset_name: fgddem-x86_64-unknown-linux-gnu
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      asset_name: fgddem-aarch64-unknown-linux-gnu
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      asset_name: fgddem-aarch64-apple-darwin
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      asset_name: fgddem-x86_64-pc-windows-msvc.exe
                      binary_suffix: .exe
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v5
            - uses: houseabsolute/actions-rust-cross@v0
              with:
                  target: ${{ matrix.target }}
                  args: '--locked --release'
                  strip: true
            - name: Rename binary
              shell: bash
              run: cp target/${{ matrix.target }}/release/fgddem${{ matrix.binary_suffix }} ${{ matrix.asset_name }}
            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.asset_name }}
